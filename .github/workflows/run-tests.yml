name: Run Tests & Sync to Qase

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run NUnit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore packages
        run: dotnet restore EOSClient.Tests/EOSClient.Tests.csproj

      - name: Build tests
        run: dotnet build EOSClient.Tests/EOSClient.Tests.csproj --no-restore --configuration Release

      - name: Run tests & report to Qase
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
        run: dotnet test EOSClient.Tests/EOSClient.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Run tests (without Qase)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: dotnet test EOSClient.Tests/EOSClient.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"
